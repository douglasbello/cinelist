<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE-edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
		crossorigin="anonymous">
	<script src="https://kit.fontawesome.com/006642858d.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
		crossorigin="anonymous"></script>
	<link
		href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;1,600&family=Ubuntu&family=Work+Sans&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="css/login.css">
	<link th:replace="fragments/fragments :: favicon">
	<title>Login</title>
</head>

<body>
	<div class="container">
	        <div class="box">
	            <p class="login">Entrar na CineList</p>
	            <form method="POST" th:action="@{/sign-in}" th:object="${user}" class="form">
					<div class="alert alert-danger" role="alert" th:if="${error}" style="margin-left: 40px">
						<strong th:text="${error}"></strong>
					</div>

	                <div class="mb-3">
						<div class="alert alert-danger" role="alert" th:if="${#fields.hasErrors('username')}">
							<label class="validation-message" th:errors="*{username}"></label>
						</div>
	                    <label for="username-input" class="form-label"><span class="instruction">Seu usuário</span></label>
	                    <input placeholder="Seu nome de usuário" type="text" class="form-control" id="username-input"
	                            name="username" th:value="${user.username}">
	                </div>
	                <div class="mb-3">
						<div class="alert alert-danger" role="alert" th:if="${#fields.hasErrors('password')}">
							<label class="validation-message" th:errors="*{password}"></label>
						</div>
	                    <label for="password-input" class="form-label"><span class="instruction">Sua senha</span></label>
	                    <input placeholder="Sua senha" type="password" class="form-control" id="password-input"
	                           name="password" th:value="${user.password}">
	                </div>
	                <p class="sign-up-redirect">Não é cadastrado? <a th:href="@{/sign-up}">Cadastrar</a></p>
	                <button type="submit" class="btn btn-primary">Entrar</button>
	            </form>
	        </div>
	    </div>
</body>
</html>
